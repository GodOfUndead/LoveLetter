<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pretty URL Love Letter</title>
<style>
body{font-family:Arial,sans-serif;max-width:700px;margin:40px auto;padding:20px}
input,button{padding:10px;margin:5px}
</style>
</head>
<body>
<h1>Pretty URL Love Letter</h1>
<p>Generate links like /#Rahul/Priya</p>
<input id="from" placeholder="Your name">
<input id="to" placeholder="Loved one's name">
<button onclick="gen()">Generate</button>
<p id="out"></p>
<div id="letter"></div>
<script>
function renderLetter() {
  if (!location.hash) return;

  let parts = location.hash.substring(1).split('/');

  if (parts.length === 2) {
    let from = decodeURIComponent(parts[0]);
    let to = decodeURIComponent(parts[1]);

    document.getElementById('letter').innerHTML = `
      <h2>For ${to} ❤️</h2>
      <p>
        Dear ${to},<br><br>
        Every moment with you makes my life brighter.
        Thank you for being part of my journey.
        <br><br>
        Forever yours,<br>
        ${from}
      </p>
    `;
  }
}

function gen() {
  let from = document.getElementById('from').value.trim();
  let to = document.getElementById('to').value.trim();

  location.hash =
    encodeURIComponent(from) +
    '/' +
    encodeURIComponent(to);

  document.getElementById('out').innerHTML =
    '<a href="' + location.href + '">' + location.href + '</a>';

  renderLetter();
}

window.addEventListener('hashchange', renderLetter);
renderLetter();
</script>
</body>
</html>
